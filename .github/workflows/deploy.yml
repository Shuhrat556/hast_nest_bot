name: Deploy Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$SERVER_IP" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SERVER_IP secret is not configured; skipping SSH deploy."
            exit 0
          fi

          if [ -z "$SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SSH_KEY secret is not configured; skipping SSH deploy."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: SSH Deploy
        if: steps.deploy_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /root/hast_nest_bot
            git pull origin main
            docker compose down
            docker compose up -d --build
