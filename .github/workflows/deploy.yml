name: Deploy Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$SERVER_IP" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SERVER_IP secret is not configured; skipping SSH deploy."
            exit 0
          fi

          if [ -z "$SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SSH_KEY secret is not configured; skipping SSH deploy."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: SSH Deploy
        if: steps.deploy_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /root/hast_nest_bot
            git checkout main
            git pull --ff-only origin main

            cd /root/hast_nest_bot/bot
            npm ci --omit=dev

            cd /root/hast_nest_bot
            if pm2 describe mybot > /dev/null 2>&1; then
              pm2 restart mybot --update-env
            else
              pm2 start ecosystem.config.js --only mybot
            fi
            pm2 save
            pm2 status mybot
