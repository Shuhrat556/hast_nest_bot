name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/bot.js && node --check src/handlers/start.js && node --check src/handlers/callbacks.js && node --check src/handlers/reason.js && node --check src/handlers/admin.js
